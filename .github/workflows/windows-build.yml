name: Windows Build

# Produces an unsigned Windows installer (.exe + .msi) you can download from the
# run's Artifacts and hand to a tester. Trigger manually or on push to main.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # publish the installer to a Release
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (unsigned)
        run: pnpm tauri build

      - name: Upload installers (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: beacon-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      # Publish to a public, always-downloadable "latest" release.
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Beacon 最新版（Windows）
          body: |
            未签名内部测试版。下载 `Beacon_*_x64-setup.exe` 安装。
            首次启动会自动下载 Codex 引擎（约 90MB），然后选择模型供应商（如 DeepSeek）填入 API Key 即可使用。
            SmartScreen 提示时点「更多信息 → 仍要运行」。
          prerelease: true
          make_latest: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
